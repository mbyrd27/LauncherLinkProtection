<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checking Permissions...</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #f9f9f9; }
        .error-container { display: none; text-align: center; padding: 20px; border: 2px solid #ff4d4d; border-radius: 8px; background: #fff; }
        h1 { color: #ff4d4d; }
        #loading { color: #666; }
    </style>
</head>
<body>

    <div id="loading">Verifying launch source...</div>

    <div id="error-msg" class="error-container">
        <h1>Oops! Unauthorized Launch</h1>
        <p>This content must be launched through the official learning portal.</p>
        <p><small>Reference: mbyrd27.github.io</small></p>
    </div>

    <script>
        (function() {
    const authorizedReferrer = "demo.contentcontroller.com";
    const ref = document.referrer.toLowerCase();
    
    // We need to reach the Lead-In page which is our immediate parent
    const leadInPage = window.parent;

    // STAGE 1: Verify the immediate source is Content Controller
    const isFromLeadIn = ref.includes(authorizedReferrer);

    // STAGE 2: Hierarchy Check
    // In a portal launch, we are an iframe in an iframe (3 levels deep).
    // In a copy/paste launch, we are an iframe in a top window (2 levels deep).
    // Logic: window.top is the very top. window.parent is the Lead-In page.
    // If we are in the portal, window.parent will NOT be the top window.
    const isInsidePortal = (window.parent !== window.top);

    if (isFromLeadIn && isInsidePortal) {
        document.getElementById('loading').style.display = 'none';
        
        window.concedeToLaunch = function () {
            try {
                // Inform the Lead-In page we are ready
                leadInPage.postMessage({ 'message': "Success" }, "*");
            } catch (err) {
                console.error("PostMessage failed:", err);
            }
        };

        window.concedeToLaunch();

    } else {
        // Show the "Oops" message
        document.getElementById('loading').style.display = 'none';
        document.getElementById('error-msg').style.display = 'block';
        
        console.warn("Unauthorized: Launch must originate from the portal.");
    }
})();
    </script>
</body>
</html>
