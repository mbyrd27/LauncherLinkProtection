<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Verifying Launch...</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #f9f9f9; }
        /* Notice: Error is visible by default now */
        #error-msg { display: block; text-align: center; padding: 20px; border: 2px solid #ff4d4d; border-radius: 8px; background: #fff; color: #ff4d4d; }
        #loading { display: none; color: #666; }
    </style>
</head>
<body>

    <div id="error-msg">
        <h1>Oops! Unauthorized Launch</h1>
        <p>This content must be launched through the official learning portal.</p>
    </div>

    <div id="loading">Verifying launch source...</div>

    <script>
    (function() {
        const errorMsg = document.getElementById('error-msg');
        const loadingMsg = document.getElementById('loading');

        // Logic to determine if we are nested: Portal -> Lead-In -> launch_check
        let isInsidePortal = false;

        try {
            // Check for Ancestor Origins (Chrome/Safari)
            if (window.location.ancestorOrigins) {
                isInsidePortal = (window.location.ancestorOrigins.length >= 2);
            } 
            // Fallback (Firefox)
            else {
                // In a portal launch, this comparison triggers a SecurityError
                // In a copy-paste, this is allowed and returns false.
                isInsidePortal = (window.parent !== window.top);
            }
        } catch (e) {
            // If the browser blocks the check, we are almost certainly cross-domain
            // which in your setup means the Portal is present.
            isInsidePortal = true;
        }

        if (isInsidePortal) {
            // SUCCESS: Switch UI to loading and send the handshake
            errorMsg.style.display = 'none';
            loadingMsg.style.display = 'block';
            
            try {
                // Post "Success" to the Content Controller Lead-In parent
                window.parent.postMessage({ 'message': "Success" }, "*");
            } catch (err) {
                // If message fails, revert to error
                loadingMsg.style.display = 'none';
                errorMsg.style.display = 'block';
            }
        } else {
            // FAILURE: Do nothing; the error message is already visible by default.
            console.warn("Direct access detected. Launch blocked.");
        }
    })();
    </script>
</body>
</html>
