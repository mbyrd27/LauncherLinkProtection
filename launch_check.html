<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Verifying Launch...</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #f9f9f9; }
        /* Notice: Error is visible by default now */
        #error-msg { display: block; text-align: center; padding: 20px; border: 2px solid #ff4d4d; border-radius: 8px; background: #fff; color: #ff4d4d; }
        #loading { display: none; color: #666; }
    </style>
</head>
<body>

    <div id="error-msg">
        <h1>Oops! Unauthorized Launch</h1>
        <p>This content must be launched through the official learning portal.</p>
    </div>

    <div id="loading">Verifying launch source...</div>

    <script>
    (function() {
    const authorizedPortal = "mbyrd27.github.io";
    const authorizedLeadIn = "demo.contentcontroller.com";
    
    const errorMsg = document.getElementById('error-msg');
    const loadingMsg = document.getElementById('loading');
    const ref = document.referrer.toLowerCase();

    let isAuthorized = false;

    // 1. Chrome/Safari Check: Look at the full ancestor chain
    if (window.location.ancestorOrigins) {
        const ancestors = Array.from(window.location.ancestorOrigins);
        // Success if we see BOTH the portal and the Lead-In in the history
        const sawPortal = ancestors.some(domain => domain.includes(authorizedPortal));
        const sawLeadIn = ancestors.some(domain => domain.includes(authorizedLeadIn));
        
        if (sawPortal && sawLeadIn) {
            isAuthorized = true;
        }
    } 
    // 2. Firefox/Universal Fallback: Identity Testing
    else {
        try {
            // In a copy-paste, Lead-In is the TOP window. 
            // Since Lead-In and this script are usually same-origin or friendly,
            // we check if the top window's location contains the portal string.
            // If it's a portal launch, this line WILL THROW A SECURITY ERROR.
            if (window.top.location.href.includes(authorizedPortal)) {
                isAuthorized = true;
            }
        } catch (e) {
            // If we get a Security Error (Access Denied), it PROVES the top window
            // is a different domain (the Portal). Since we already verified 
            // the referrer is Content Controller, this is a valid launch.
            if (ref.includes(authorizedLeadIn)) {
                isAuthorized = true;
            }
        }
    }

    if (isAuthorized) {
        errorMsg.style.display = 'none';
        loadingMsg.style.display = 'block';
        
        // Handshake to launch
        window.parent.postMessage({ 'message': "Success" }, "*");
    } else {
        // Leave the error message visible (Default state)
        console.warn("Hierarchy validation failed. Launch blocked.");
    }
})();
</script>
    
</body>
</html>
