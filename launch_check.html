<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checking Permissions...</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #f9f9f9; }
        .error-container { display: none; text-align: center; padding: 20px; border: 2px solid #ff4d4d; border-radius: 8px; background: #fff; }
        h1 { color: #ff4d4d; }
        #loading { color: #666; }
    </style>
</head>
<body>

    <div id="loading">Verifying launch source...</div>

    <div id="error-msg" class="error-container">
        <h1>Oops! Unauthorized Launch</h1>
        <p>This content must be launched through the official learning portal.</p>
        <p><small>Reference: mbyrd27.github.io</small></p>
    </div>

    <script>
        (function() {
    // 1. We only want to allow the redirect if we are coming from 
    // the Content Controller Lead-In page.
    const authorizedReferrer = "demo.contentcontroller.com";
    
    const ref = document.referrer.toLowerCase();
    const launcher = window.parent;

    // 2. STAGE 1: Check Referrer
    const hasCorrectSource = ref.includes(authorizedReferrer);

    // 3. STAGE 2: Check Framing
    // If someone copy-pastes the check URL directly, window.parent === window.
    // We only want to succeed if we are INSIDE the Content Controller iframe.
    const isInsideIframe = (window.self !== window.top);

    if (hasCorrectSource && isInsideIframe) {
        document.getElementById('loading').style.display = 'none';
        
        window.concedeToLaunch = function () {
            try {
                // Firing the success message to the Lead-In page
                launcher.postMessage({ 'message': "Success" }, "*");
            } catch (err) {
                console.error("Communication error:", err);
            }
        };

        window.concedeToLaunch();

    } else {
        // Failure: This triggers if the referrer is wrong OR 
        // if they hit this URL directly (not in an iframe).
        document.getElementById('loading').style.display = 'none';
        document.getElementById('error-msg').style.display = 'block';
        
        console.warn("Unauthorized access blocked.");
        console.warn("Referrer:", ref);
        console.warn("Is Framed:", isInsideIframe);
    }
})();
    </script>
</body>
</html>
