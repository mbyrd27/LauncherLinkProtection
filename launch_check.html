<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checking Permissions...</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #f9f9f9; }
        .error-container { display: none; text-align: center; padding: 20px; border: 2px solid #ff4d4d; border-radius: 8px; background: #fff; }
        h1 { color: #ff4d4d; }
        #loading { color: #666; }
    </style>
</head>
<body>

    <div id="loading">Verifying launch source...</div>

    <div id="error-msg" class="error-container">
        <h1>Oops! Unauthorized Launch</h1>
        <p>This content must be launched through the official learning portal.</p>
        <p><small>Reference: mbyrd27.github.io</small></p>
    </div>

    <script>
        (function() {
    // 1. Add ALL authorized domains that touch the launch process
    const authorizedDomains = [
        "mbyrd27.github.io",
        "demo.contentcontroller.com"
    ];
    
    const ref = document.referrer.toLowerCase();
    
    // 2. Check if the referrer matches ANY of our allowed domains
    const isAuthorized = authorizedDomains.some(domain => ref.includes(domain.toLowerCase()));

    // 3. Since Content Controller redirects break 'window.opener', 
    // we should rely primarily on the Referrer check for this specific setup.
    if (isAuthorized) {
        document.getElementById('loading').style.display = 'none';
        
        window.concedeToLaunch = function () {
            // We use window.parent as a fallback in case it's in an iframe
            const target = window.opener || window.parent;
            if (target) {
                target.postMessage({ 'message': "" }, "*");
                console.log("PostMessage sent.");
            }
        };

        window.concedeToLaunch();

    } else {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('error-msg').style.display = 'block';
        
        console.warn("Access Denied. Referrer:", ref);
    }
})();
    </script>
</body>
</html>
