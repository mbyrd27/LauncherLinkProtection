<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checking Permissions...</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #f9f9f9; }
        .error-container { display: none; text-align: center; padding: 20px; border: 2px solid #ff4d4d; border-radius: 8px; background: #fff; }
        h1 { color: #ff4d4d; }
        #loading { color: #666; }
    </style>
</head>
<body>

    <div id="loading">Verifying launch source...</div>

    <div id="error-msg" class="error-container">
        <h1>Oops! Unauthorized Launch</h1>
        <p>This content must be launched through the official learning portal.</p>
        <p><small>Reference: mbyrd27.github.io</small></p>
    </div>

    <script>
        <script>
(function() {
    const errorMsg = document.getElementById('error-msg');
    const loadingMsg = document.getElementById('loading');

    function showOops() {
        loadingMsg.style.display = 'none';
        errorMsg.style.display = 'block';
    }

    // 1. Determine the depth of the window
    // Scenario A (Portal): You -> Lead-In -> Portal (Depth is 2 levels deep)
    // Scenario B (Copy/Paste): You -> Lead-In (Lead-In is the Top, Depth is 1 level deep)
    
    let isInsidePortal = false;

    try {
        // We check if our parent is the absolute top window.
        // In a copy/paste, the Lead-In page IS the top window, so this comparison works.
        if (window.parent === window.top) {
            
            // If they are equal, we are only 1 level deep. 
            // We must now check if we can actually READ the location of 'top'.
            // In a Copy/Paste, we CAN read it because we share a domain with the Lead-In.
            // In a Portal launch, we CANNOT read it because 'top' is the Portal.
            const testIdentity = window.top.location.href;
            
            // If we reached this line, it's a Copy/Paste.
            isInsidePortal = false;
        } else {
            // Our parent is NOT the top, meaning there is a Grandparent (The Portal).
            isInsidePortal = true;
        }
    } catch (e) {
        // If an error is thrown, it's because the browser blocked us from 
        // comparing 'parent' to 'top' or reading 'href'.
        // This ONLY happens when the domains are different (Legitimate Portal Launch).
        isInsidePortal = true;
    }

    if (isInsidePortal) {
        // SUCCESS: Hide loading and concede
        loadingMsg.style.display = 'none';
        
        // This is the standard Content Controller handshake
        // It uses the Lead-In page's existing listener to trigger the redirect
        window.parent.postMessage({ 'message': "Success" }, "*");

    } else {
        // FAILURE: Show the Unauthorized message
        showOops();
    }
})();
</script>
    </script>
</body>
</html>
