<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checking Permissions...</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #f9f9f9; }
        .error-container { display: none; text-align: center; padding: 20px; border: 2px solid #ff4d4d; border-radius: 8px; background: #fff; }
        h1 { color: #ff4d4d; }
        #loading { color: #666; }
    </style>
</head>
<body>

    <div id="loading">Verifying launch source...</div>

    <div id="error-msg" class="error-container">
        <h1>Oops! Unauthorized Launch</h1>
        <p>This content must be launched through the official learning portal.</p>
        <p><small>Reference: mbyrd27.github.io</small></p>
    </div>

    <script>
        (function() {
    // The site allowed to "refer" learners to this page
    const authorizedOrigin = "mbyrd27.github.io";
    
    const launcher = window.opener;
    const ref = document.referrer;

    // Logic: 
    // 1. Does the referrer string contain our authorized domain?
    // 2. Is there an active 'opener' (meaning it was clicked from a link)?
    const isAuthorized = ref.toLowerCase().includes(authorizedOrigin.toLowerCase());
    const hasOpener = (launcher !== null && launcher !== undefined);

    if (isAuthorized && hasOpener) {
        // Success: Hide error, run the concede function
        document.getElementById('loading').style.display = 'none';
        
        // We attach to window so it's globally accessible if needed
        window.concedeToLaunch = function () {
            try {
                launcher.postMessage({ 'message': "Success" }, "*");
                console.log("PostMessage sent to launcher.");
            } catch (err) {
                console.error("Failed to postMessage:", err);
            }
        };

        window.concedeToLaunch();

    } else {
        // Failure: Show error
        document.getElementById('loading').style.display = 'none';
        document.getElementById('error-msg').style.display = 'block';
        
        // Helpful for your debugging:
        console.warn("Blocked Referrer:", ref);
        console.warn("Opener Status:", hasOpener);
    }
})();
    </script>
</body>
</html>
