<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checking Permissions...</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #f9f9f9; }
        .error-container { display: none; text-align: center; padding: 20px; border: 2px solid #ff4d4d; border-radius: 8px; background: #fff; }
        h1 { color: #ff4d4d; }
        #loading { color: #666; }
    </style>
</head>
<body>

    <div id="loading">Verifying launch source...</div>

    <div id="error-msg" class="error-container">
        <h1>Oops! Unauthorized Launch</h1>
        <p>This content must be launched through the official learning portal.</p>
        <p><small>Reference: mbyrd27.github.io</small></p>
    </div>

    <script>
        (function() {
    const authorizedReferrer = "demo.contentcontroller.com";
    const ref = document.referrer.toLowerCase();
    const errorMsg = document.getElementById('error-msg');
    const loadingMsg = document.getElementById('loading');

    function showUnauthorized() {
        loadingMsg.style.display = 'none';
        errorMsg.style.display = 'block';
    }

    // STAGE 1: Referrer Check
    if (!ref.includes(authorizedReferrer)) {
        showUnauthorized();
        return;
    }

    // STAGE 2: Hierarchy Check (The "Secret Sauce")
    let isInsidePortal = false;

    try {
        // If this line SUCCEEDS, window.parent and window.top are accessible.
        // This only happens if they are the SAME domain (Copy-Paste scenario).
        if (window.parent === window.top) {
            isInsidePortal = false; 
        } else {
            isInsidePortal = true;
        }
    } catch (e) {
        // If this line THROWS AN ERROR, it means the browser blocked access
        // because window.top is a DIFFERENT domain (mbyrd27.github.io).
        // This is a "Legitimate Launch" signal!
        isInsidePortal = true;
    }

    if (isInsidePortal) {
        loadingMsg.style.display = 'none';
        window.concedeToLaunch = function () {
            try {
                window.parent.postMessage({ 'message': "Success" }, "*");
            } catch (err) {
                console.error("Communication error:", err);
            }
        };
        window.concedeToLaunch();
    } else {
        showUnauthorized();
    }
})();
    </script>
</body>
</html>
